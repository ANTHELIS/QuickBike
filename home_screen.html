<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QuickBike Home Screen</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font Awesome for icons (implied by the visual style) -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
<style data-purpose="layout-styles">/* Map Background styling */
.bg-map {
    background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuAIyBTvzQef0d19-Gge9-5JuugKVZ7Mas8r10xEcdlEey6qwMqp-Vp2Qr2stShE8Z96zONXBSIS7BUWXoz3Yv09UD50ghRLUUUGY7ucKUFfZt49lGMdke8iZJ9RxvHrI4Pae8YTrUjcYBKn_Kn0hk1Ax-l7jI28y6ukQJ2Zjl5i8wt98q0A35otZ8ncVsN9m1w-7m95RgeJE3nAlTJzUFo7gJLiZXV3YfZdOVkKuK1SwYo1-YmGpWMiB3tOCidfXi2JFHxOId7xZ3va);
    background-size: cover;
    background-position: center
    }
/* Custom scrollbar hiding for clean mobile look */
.no-scrollbar::-webkit-scrollbar {
    display: none
    }
.no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none
    }</style>
</head>
<body class="bg-black text-slate-900 flex justify-center items-center min-h-screen">
<!-- BEGIN: Mobile Container -->
<main class="relative w-full max-w-[390px] h-[844px] bg-map overflow-hidden shadow-2xl flex flex-col">
<!-- BEGIN: Top Navigation Bar -->
<header class="flex items-center justify-between px-6 py-4 pt-12" data-purpose="top-navigation">
<button aria-label="Menu" class="text-slate-800 p-2">
<i class="fa-solid fa-bars text-xl"></i>
</button>
<h1 class="text-2xl font-bold text-slate-900">QuickBike</h1>
<div class="relative" data-purpose="user-profile">
<div class="w-10 h-10 rounded-full border-2 border-orange-500 overflow-hidden flex items-center justify-center bg-slate-200">
<i class="fa-solid fa-user text-slate-600"></i>
</div>
</div>
</header>
<!-- END: Top Navigation Bar -->
<!-- BEGIN: Scrollable Content Area -->
<section class="flex-1 overflow-y-auto no-scrollbar px-6 pb-24 space-y-4">
<!-- BEGIN: Search and Quick Links Section -->
<div class="bg-slate-200/90 backdrop-blur-md rounded-[32px] p-6 shadow-lg" data-purpose="destination-picker">
<h2 class="text-3xl font-bold mb-6">Where to?</h2>
<!-- Search Bar -->
<div class="relative mb-6">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<i class="fa-solid fa-magnifying-glass text-orange-800"></i>
</div>
<input class="w-full bg-slate-100 border-none rounded-lg py-3 pl-12 pr-4 text-slate-800 placeholder-slate-500 focus:ring-2 focus:ring-orange-500" placeholder="Enter destination" type="text"/>
</div>
<!-- Quick Buttons Row -->
<div class="flex flex-wrap gap-2">
<button class="flex items-center gap-2 bg-white/80 px-4 py-2 rounded-full border border-slate-200 shadow-sm hover:bg-white transition-colors">
<i class="fa-solid fa-house text-orange-700 text-sm"></i>
<span class="font-medium">Home</span>
</button>
<button class="flex items-center gap-2 bg-white/80 px-4 py-2 rounded-full border border-slate-200 shadow-sm hover:bg-white transition-colors">
<i class="fa-solid fa-briefcase text-orange-700 text-sm"></i>
<span class="font-medium">Work</span>
</button>
<button class="flex items-center gap-2 bg-white/80 px-4 py-2 rounded-full border border-slate-200 shadow-sm hover:bg-white transition-colors">
<i class="fa-solid fa-plus text-orange-700 text-sm"></i>
<span class="font-medium">Add New</span>
</button>
</div>
</div>
<!-- END: Search and Quick Links Section -->
<!-- BEGIN: Recents Section -->
<div class="bg-slate-200/90 backdrop-blur-md rounded-[32px] p-6 shadow-lg" data-purpose="recents-list">
<div class="flex justify-between items-center mb-4">
<h3 class="text-xl font-bold">Recents</h3>
<button class="text-slate-500"><i class="fa-solid fa-ellipsis"></i></button>
</div>
<ul class="space-y-4">
<!-- Recent Item 1 -->
<li class="flex items-center justify-between group cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600">
<i class="fa-regular fa-clock"></i>
</div>
<div>
<p class="font-semibold text-slate-800">Orchard Central</p>
<p class="text-xs text-slate-500">181 Orchard Rd, Singapore</p>
</div>
</div>
<i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-slate-500 transition-colors"></i>
</li>
<!-- Recent Item 2 -->
<li class="flex items-center justify-between group cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600">
<i class="fa-regular fa-clock"></i>
</div>
<div>
<p class="font-semibold text-slate-800">Marina Bay Sands</p>
<p class="text-xs text-slate-500">10 Bayfront Ave, Singapore</p>
</div>
</div>
<i class="fa-solid fa-chevron-right text-slate-300 group-hover:text-slate-500 transition-colors"></i>
</li>
</ul>
</div>
<!-- END: Recents Section -->
<!-- BEGIN: Active Deal Card -->
<div class="bg-white rounded-[32px] p-6 shadow-lg relative overflow-hidden border-l-8 border-orange-500" data-purpose="active-deal">
<div class="flex justify-between items-start mb-4">
<span class="bg-orange-500 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider">Active Deal</span>
<span class="text-2xl font-black text-orange-900">₹375</span>
</div>
<div class="mb-6">
<h4 class="text-xl font-bold text-slate-800">QuickBike Pro</h4>
<p class="text-sm text-slate-500">Available nearby • 3 min away</p>
</div>
<button class="w-full bg-gradient-to-r from-orange-600 to-orange-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
          Quick Book
        </button>
</div>
<!-- END: Active Deal Card -->
<!-- BEGIN: Weekly Streak Banner -->
<div class="bg-black/90 rounded-[32px] p-6 shadow-lg relative overflow-hidden flex items-center justify-between" data-purpose="weekly-streak">
<div class="relative z-10">
<span class="text-orange-400 text-[10px] font-bold uppercase tracking-widest mb-1 block">Weekly Streak</span>
<h4 class="text-xl font-bold text-white leading-tight">Get 30% off your next ride!</h4>
</div>
<!-- Decorative SVG/Icon for streak background effect -->
<div class="absolute right-[-10px] bottom-[-20px] opacity-20">
<i class="fa-solid fa-bicycle text-[120px] text-white"></i>
</div>
</div>
<!-- END: Weekly Streak Banner -->
</section>
<!-- END: Scrollable Content Area -->
<!-- BEGIN: Location Floating Action Button -->
<button class="absolute bottom-28 right-6 w-12 h-12 bg-white rounded-full shadow-xl flex items-center justify-center text-slate-700 active:bg-slate-100" data-purpose="locate-me">
<i class="fa-solid fa-location-crosshairs text-xl"></i>
</button>
<!-- END: Location Floating Action Button -->
<!-- BEGIN: Bottom Tab Navigation -->
<nav class="absolute bottom-0 w-full bg-slate-50/95 backdrop-blur-lg border-t border-slate-200 px-6 py-4 flex justify-between items-center rounded-t-[40px] shadow-[0_-10px_30px_rgba(0,0,0,0.1)]" data-purpose="bottom-navigation">
<div class="flex flex-col items-center gap-1 group">
<div class="bg-orange-50 px-5 py-2 rounded-2xl flex flex-col items-center">
<i class="fa-solid fa-bicycle text-orange-600 text-xl"></i>
<span class="text-[10px] font-bold text-orange-600 mt-1">Ride</span>
</div>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors cursor-pointer">
<i class="fa-solid fa-clock-rotate-left text-xl"></i>
<span class="text-[10px] font-medium">Activity</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 transition-colors cursor-pointer">
<i class="fa-solid fa-user-large text-xl"></i>
<span class="text-[10px] font-medium">Account</span>
</div>
</nav>
<!-- END: Bottom Tab Navigation -->
</main>
<!-- END: Mobile Container -->
</body></html>
