<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QuickBike: On Your Way</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Font Configuration (Simulated) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<style data-purpose="global-styles">
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .custom-shadow {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">
<!-- BEGIN: Mobile Container -->
<main class="w-[390px] h-[844px] bg-white overflow-hidden flex flex-col relative border border-gray-200 rounded-[40px] shadow-2xl">
<!-- BEGIN: Header -->
<header class="bg-[#E0F2F1] px-6 pt-12 pb-4 flex items-center justify-between z-10" data-purpose="app-header">
<div class="flex items-center gap-4">
<button aria-label="Menu" class="p-2">
<svg class="text-gray-700" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24"><line x1="3" x2="21" y1="12" y2="12"></line><line x1="3" x2="21" y1="6" y2="6"></line><line x1="3" x2="21" y1="18" y2="18"></line></svg>
</button>
<h1 class="text-2xl font-extrabold text-[#1A202C]">QuickBike</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-white shadow-sm">
<img alt="User Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqqJ3NGCgfwq5ERTRkM-0UgX3VyJyTPbojCUUoyV5ZIwa_0NIaiF204y-_d71CDOfmsVRkra332JUcgF6CQcS4HVDIAmdJ6crufIyklE4dg488rC2eZj5z7PIu-K914HLIy4Dk6J66CtjMy4SpXQjbCcX-VeILBca5Ds4Ct933by9FOYWcGJgedgpCHDza8sW_IxjLF2O7x1ZkM0z7zsk7MhYnpCndkZCIJcb_U5yeVosP4aG2m01uTMMEj31C1Ylf6292x7GKeASM"/>
</div>
</header>
<!-- END: Header -->
<!-- BEGIN: Map Area -->
<section class="flex-1 relative overflow-hidden bg-[#B2DFDB]" data-purpose="map-background">
<!-- Simulated Map Pattern -->
<div class="absolute inset-0 opacity-40" style="background-image: radial-gradient(#ffffff 2px, transparent 2px); background-size: 30px 30px;"></div>
<div class="absolute inset-0 flex items-center justify-center">
<!-- Main Roads -->
<div class="absolute w-full h-[4px] bg-white/50 top-1/4"></div>
<div class="absolute w-full h-[4px] bg-white/50 top-2/4"></div>
<div class="absolute w-full h-[4px] bg-white/50 top-3/4"></div>
<div class="absolute h-full w-[4px] bg-white/50 left-1/4"></div>
<div class="absolute h-full w-[4px] bg-white/50 left-2/4"></div>
<div class="absolute h-full w-[4px] bg-white/50 left-3/4"></div>
</div>
<!-- Route Line (Dashed) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" data-purpose="route-visual">
<path d="M150 250 L200 400 L220 500" fill="none" stroke="#FF8F00" stroke-dasharray="8,8" stroke-width="4"></path>
<path class="opacity-80" d="M150 480 H280 Q320 480 320 520 V650" fill="none" stroke="#FFB74D" stroke-width="14"></path>
</svg>
<!-- Bike Icon on Map -->
<div class="absolute top-[450px] left-[230px] z-10">
<div class="bg-[#EF6C00] p-2 rounded-full border-2 border-white shadow-lg">
<svg fill="none" height="20" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="20"><circle cx="5.5" cy="17.5" r="3.5"></circle><circle cx="18.5" cy="17.5" r="3.5"></circle><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"></path></svg>
</div>
</div>
<!-- Target Marker -->
<div class="absolute top-[480px] left-[200px] text-blue-500">
<svg fill="none" height="16" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24" width="16"><circle cx="12" cy="12" r="10"></circle><line x1="12" x2="12" y1="8" y2="16"></line><line x1="8" x2="16" y1="12" y2="12"></line></svg>
</div>
<!-- BEGIN: Fare Info Card -->
<div class="absolute top-4 left-4 right-4 z-20">
<div class="bg-white/90 backdrop-blur-md rounded-3xl p-6 custom-shadow flex justify-between items-center">
<div>
<h2 class="text-xl font-bold text-gray-800">Arriving in 4 mins</h2>
<p class="text-sm text-gray-500">2.1 km to your destination</p>
</div>
<div class="text-right">
<div class="text-2xl font-black text-[#A85507]">₹125.50</div>
<div class="text-[10px] font-bold text-gray-400 tracking-widest uppercase">Fixed Fare</div>
</div>
</div>
<!-- Status Bubbles -->
<div class="mt-4 flex gap-3">
<div class="flex-1 bg-white/90 backdrop-blur-md rounded-2xl p-3 flex items-center justify-center gap-2 border border-white/50">
<span class="text-[10px] font-black text-[#A85507] tracking-tighter">HELMET</span>
<span class="text-[10px] text-gray-600 leading-tight">Wear a<br/>Helmet</span>
</div>
<div class="flex-1 bg-white/90 backdrop-blur-md rounded-2xl p-3 flex items-center justify-center gap-2 border border-white/50">
<div class="p-1.5 bg-orange-100 rounded-lg">
<svg fill="none" height="14" stroke="#A85507" stroke-width="2" viewbox="0 0 24 24" width="14"><rect height="11" rx="2" ry="2" width="18" x="3" y="11"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
</div>
<span class="text-[10px] font-bold text-gray-600">Check OTP</span>
</div>
</div>
</div>
<!-- END: Fare Info Card -->
<!-- BEGIN: Driver Profile Card -->
<div class="absolute bottom-6 left-4 right-4 z-20">
<div class="bg-white rounded-[32px] p-6 shadow-xl border border-gray-100">
<div class="flex items-start justify-between mb-6">
<div class="flex gap-4">
<div class="relative">
<div class="w-16 h-16 rounded-2xl overflow-hidden bg-blue-100">
<img alt="Driver" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCAR8gOp_Ij7fc7gY0c5K0JmjfTamuztI0TF-v7w_-FrXcJxl9jXIqLhhMqNeRxQIUVxlm4qOkb4PpT3zuK9g0gKEYFR2bZWJSt90RLxrpaqKG_t6z5Qi6bOGFuQb9_tzKaOcJHg989H-19Zlut_ca0xYSbenB1q8mXQRqKL-6T3bS7R4ctN_WsGQ7XcPjj0FRnB4OJgSA7yeNp4XaTi8AYC3z2mfmSDAhYmpeWpfDf9x6IcMsTNIpQ8rWMsTqG1FHKWkaeUcTN3KeJ"/>
</div>
<div class="absolute -bottom-2 -right-1 bg-orange-400 text-white text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1 border-2 border-white">
                  4.9 <span>★</span>
</div>
</div>
<div>
<h3 class="text-xl font-bold text-gray-800">Budi Santoso</h3>
<p class="text-sm text-gray-500">Honda Vario • B 4932 KLP</p>
</div>
</div>
<div class="flex flex-col items-center">
<div class="bg-orange-500 text-white p-1 rounded-lg">
<svg fill="currentColor" height="18" viewbox="0 0 24 24" width="18"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"></path></svg>
</div>
<span class="text-[8px] font-bold text-gray-500 mt-1 uppercase text-center leading-none">Pro<br/>Driver</span>
</div>
</div>
<div class="flex gap-3 mb-6">
<button class="flex-1 bg-gray-100 hover:bg-gray-200 transition-colors py-4 rounded-2xl flex items-center justify-center gap-2 text-gray-700 font-semibold">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
              Call Driver
            </button>
<button class="flex-1 bg-gray-100 hover:bg-gray-200 transition-colors py-4 rounded-2xl flex items-center justify-center gap-2 text-gray-700 font-semibold">
<svg fill="none" height="18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="18"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
              Message
            </button>
</div>
<button class="w-full bg-gradient-to-r from-[#C26700] to-[#E68900] hover:from-[#A15500] hover:to-[#C26700] transition-all py-5 rounded-3xl flex items-center justify-center gap-3 text-white font-bold text-lg shadow-lg">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewbox="0 0 24 24" width="20"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" x2="12" y1="8" y2="12"></line><line x1="12" x2="12.01" y1="16" y2="16"></line></svg>
            Safety Center &amp; SOS
          </button>
</div>
</div>
<!-- END: Driver Profile Card -->
</section>
<!-- END: Map Area -->
<!-- BEGIN: Bottom Navigation -->
<footer class="bg-white border-t border-gray-100 px-8 py-4 flex justify-between items-center" data-purpose="bottom-nav">
<div class="flex flex-col items-center gap-1 group">
<div class="bg-orange-50 px-5 py-2 rounded-full transition-colors group-hover:bg-orange-100">
<svg fill="none" height="24" stroke="#EF6C00" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24"><circle cx="5.5" cy="17.5" r="3.5"></circle><circle cx="18.5" cy="17.5" r="3.5"></circle><path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"></path></svg>
</div>
<span class="text-xs font-bold text-orange-600">Ride</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-400 group cursor-pointer">
<svg class="group-hover:text-gray-600" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
<span class="text-xs font-medium group-hover:text-gray-600">Activity</span>
</div>
<div class="flex flex-col items-center gap-1 text-gray-400 group cursor-pointer">
<svg class="group-hover:text-gray-600" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
<span class="text-xs font-medium group-hover:text-gray-600">Account</span>
</div>
</footer>
<!-- END: Bottom Navigation -->
</main>
<!-- END: Mobile Container -->
</body></html>
